<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能交互系统</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="layout">
    <section class="panel auth-panel">
      <h1>智能交互系统</h1>
      <p class="subtitle">基于 C++ 高并发架构与语言大模型的交互系统</p>
      <div class="demo-grid">
        <article class="demo-card">
          <h3>演示亮点</h3>
          <p>支持 C++ 接入层、Python 智能服务层和多轮问答历史展示。</p>
        </article>
        <article class="demo-card">
          <h3>答辩建议</h3>
          <p>先登录，再提问，最后展示历史记录和管理员系统概览。</p>
        </article>
      </div>
      <div class="form-row">
        <label>用户名</label>
        <input id="username" value="student">
      </div>
      <div class="form-row">
        <label>密码</label>
        <input id="password" type="password" value="student123">
      </div>
      <button id="login-btn">登录</button>
      <p id="auth-status" class="status"></p>
      <p class="hint">管理员示例账号：admin / admin123</p>
    </section>

    <section class="panel chat-panel">
      <div class="panel-header">
        <h2>多轮问答</h2>
        <button id="load-history-btn">刷新历史</button>
      </div>
      <div class="session-title">
        <span>当前会话标题</span>
        <strong id="session-title-value">未生成</strong>
      </div>
      <div id="chat-log" class="chat-log"></div>
      <div class="form-row">
        <label>问题</label>
        <textarea id="message" rows="4" placeholder="请输入你的问题"></textarea>
      </div>
      <button id="send-btn">发送</button>
    </section>

    <section class="panel history-panel">
      <div class="panel-header">
        <h2>历史记录</h2>
        <a href="./admin.html">前往管理端</a>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
